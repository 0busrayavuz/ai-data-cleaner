version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cleaner-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cleaner_db
    ports:
      - "8543:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
